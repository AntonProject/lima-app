name: lima
description: LIMA — Mobile app for medical representatives
publish_to: 'none'
version: 1.0.3+17

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  table_calendar: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.12

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.1
  equatable: ^2.0.5
  sqflite: ^2.3.3+2
  path: ^1.9.0
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  excel: ^4.0.6
  image: ^4.3.0
  open_filex: ^4.7.0
  share_plus: ^10.0.2

  cupertino_icons: ^1.0.8
  package_info_plus: ^9.0.1
  video_player: ^2.11.1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/docs/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/lima_logo_2_background.png"
  # Adaptive icon for Android (foreground logo over solid background)
  adaptive_icon_background: "#417DF7"
  adaptive_icon_foreground: "assets/images/lima_logo_2.png"
  min_sdk_android: 21
