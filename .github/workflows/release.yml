name: Release

# Build and upload to the stores on every push to main, or manually.
# All credentials come from GitHub Secrets (Settings → Secrets and variables →
# Actions). See docs/CICD.md for the full secret list and setup steps.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which store to release to"
        type: choice
        default: both
        options:
          - both
          - android
          - ios

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  # Decide which platform jobs need to run for this push, so a change that only
  # touches ios/ doesn't rebuild & re-upload Android (and vice-versa). Shared
  # code (lib/, assets/, pubspec.yaml, the workflow) triggers both. Manual
  # runs (workflow_dispatch) always build both.
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'lib/**'
              - 'assets/**'
              - 'pubspec.yaml'
              - '.github/workflows/release.yml'
            ios:
              - 'ios/**'
              - 'lib/**'
              - 'assets/**'
              - 'pubspec.yaml'
              - '.github/workflows/release.yml'

  android:
    name: Android → Google Play
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'android' || inputs.target == 'both')) || (github.event_name == 'push' && needs.changes.outputs.android == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          # Sanity-check the decoded keystore so a corrupt secret fails loudly
          # here instead of deep inside the Gradle signing task.
          keytool -list -keystore android/app/upload-keystore.jks \
            -storepass "$STORE_PASSWORD" >/dev/null
          cat > android/key.properties <<EOF
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          EOF

      - run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Upload to Google Play
        working-directory: android
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy track:internal

  ios:
    name: iOS → TestFlight
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'ios' || inputs.target == 'both')) || (github.event_name == 'push' && needs.changes.outputs.ios == 'true') }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Cloud signing: Xcode creates/downloads the distribution cert and
      # provisioning profile itself via the App Store Connect API key — no
      # manual .p12 / .mobileprovision needed. The key must live where Xcode
      # looks for it: ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
      - name: Write ASC API key for Xcode automatic signing
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys ~/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          cp "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          # Also keep a copy in the workspace for the fastlane upload step.
          echo "$ASC_KEY_BASE64" | base64 --decode > ios/AuthKey.p8

      - run: flutter pub get

      - name: Build & sign IPA (automatic, via API key)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEYPATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          # 1) Compile the unsigned .app + install pods (no signing — avoids the
          #    "No Accounts" archive failure that happens when flutter build ipa
          #    tries automatic signing without a logged-in Xcode account).
          flutter build ios --release --no-codesign

          # 2) Archive WITHOUT signing. Signing during archive defaults to an
          #    "iOS App Development" profile (needs registered devices) and
          #    fails on CI. We sign only at export, where method=app-store
          #    selects the distribution profile.
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=5N9G35WULY

          # 3) Export a signed App Store IPA. -allowProvisioningUpdates + the
          #    API key let Xcode create/download the distribution cert and the
          #    App Store provisioning profile automatically.
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$KEYPATH"

          # Resolve the exact .ipa path and hand it to the upload step (the
          # exported name follows the scheme; a relative glob from ios/ was
          # unreliable).
          IPA_PATH="$(ls "$GITHUB_WORKSPACE"/build/ios/ipa/*.ipa | head -1)"
          echo "Built IPA: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Upload to TestFlight
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/ios/AuthKey.p8
        run: bundle exec fastlane deploy ipa:"$IPA_PATH"
