name: Release

# Build and upload to the stores on every push to main, or manually.
# All credentials come from GitHub Secrets (Settings → Secrets and variables →
# Actions). See docs/CICD.md for the full secret list and setup steps.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which store to release to"
        type: choice
        default: both
        options:
          - both
          - android
          - ios

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  # Decide which platform jobs need to run for this push, so a change that only
  # touches ios/ doesn't rebuild & re-upload Android (and vice-versa). Shared
  # code (lib/, assets/, pubspec.yaml, the workflow) triggers both. Manual
  # runs (workflow_dispatch) always build both.
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'lib/**'
              - 'assets/**'
              - 'pubspec.yaml'
              - '.github/workflows/release.yml'
            ios:
              - 'ios/**'
              - 'lib/**'
              - 'assets/**'
              - 'pubspec.yaml'
              - '.github/workflows/release.yml'

  android:
    name: Android → Google Play
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'android' || inputs.target == 'both')) || (github.event_name == 'push' && needs.changes.outputs.android == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          # Sanity-check the decoded keystore so a corrupt secret fails loudly
          # here instead of deep inside the Gradle signing task.
          keytool -list -keystore android/app/upload-keystore.jks \
            -storepass "$STORE_PASSWORD" >/dev/null
          cat > android/key.properties <<EOF
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          EOF

      - run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Upload to Google Play
        working-directory: android
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy track:internal

  ios:
    name: iOS → TestFlight
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'ios' || inputs.target == 'both')) || (github.event_name == 'push' && needs.changes.outputs.ios == 'true') }}
    # macos-15 ships Xcode 26 (iOS 26 SDK), which App Store Connect now
    # requires for uploads — macos-14 only has Xcode 15.4 / iOS 17.5 SDK.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Write the App Store Connect API key both where fastlane reads it (env
      # path) and where Xcode looks for it.
      - name: Write ASC API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_BASE64" | base64 --decode > ios/AuthKey.p8

      # Import the existing Apple Distribution certificate (+ private key) into a
      # dedicated keychain so codesign can use it. We reuse this cert instead of
      # creating a new one (Apple caps the number of distribution certs).
      - name: Import distribution certificate
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KCPW="$(uuidgen)"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          # Make this keychain part of the search list (and keep login.keychain).
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          echo "$DIST_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" \
            -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KCPW" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/dist.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - run: flutter pub get

      # Precompile the unsigned .app + install pods. fastlane then handles
      # archive, signing (cert+profile issued via the API key) and export.
      - name: Flutter precompile (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Build, sign & upload to TestFlight
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/ios/AuthKey.p8
        run: bundle exec fastlane release
