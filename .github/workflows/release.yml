name: Release

# Build and upload to the stores on every push to main, or manually.
# All credentials come from GitHub Secrets (Settings → Secrets and variables →
# Actions). See docs/CICD.md for the full secret list and setup steps.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  android:
    name: Android → Google Play
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          EOF

      - run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Upload to Google Play
        working-directory: android
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy track:internal

  ios:
    name: iOS → TestFlight
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Import signing certificate & provisioning profile
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          echo "$DIST_CERT_BASE64" | base64 --decode > dist_cert.p12
          security import dist_cert.p12 -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/lima.mobileprovision"
          rm -f dist_cert.p12

      - run: flutter pub get

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Set up Ruby/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write ASC API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          echo "$ASC_KEY_BASE64" | base64 --decode > ios/AuthKey.p8

      - name: Upload to TestFlight
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/ios/AuthKey.p8
        run: bundle exec fastlane deploy
